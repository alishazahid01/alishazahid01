name: Refresh profile stats

on:
  schedule:
    - cron: "17 1 * * *" # daily
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/stats.yml"

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVGs
        run: python3 scripts/generate_stats.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats-*.svg
          git diff --cached --quiet || (git commit -m "chore: refresh profile stats" && git push)
